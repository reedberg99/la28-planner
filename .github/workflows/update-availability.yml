name: Update Ticket Availability

on:
  schedule:
    # TUESDAY (ticket window day): every hour, all day
    - cron: '0 * * * 2'
    # ALL OTHER DAYS: Mon, Wed, Thu at 9 AM PT (17:00 UTC) — light background refresh
    - cron: '0 17 * * 1,3,4'
  workflow_dispatch:   # allows manual "Run workflow" button on GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run availability scraper
        run: python scripts/update_availability.py

      - name: Commit if changed
        run: |
          git config user.email "la28bot@github-actions"
          git config user.name  "LA28 Availability Bot"
          git add availability.json
          git diff --staged --quiet || git commit -m "auto: update availability $(date -u +%Y-%m-%d)"
          git push
